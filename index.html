            padding: 0;

            padding: 20px;
        }

            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #DC143C, #FF6347);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .header .info {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 10px;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
            overflow-x: auto;
        }

        .tab-button {
            flex: 1;
            min-width: 120px;
            padding: 15px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-button:hover {
            background: #e8e8e8;
            color: #333;
        }

        .tab-button.active {
            color: #DC143C;
            border-bottom: 3px solid #DC143C;
            background: white;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .entry-form {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #DC143C;
        }

        .group-info {
            font-size: 0.9em;
            color: #666;
            margin-top: 4px;
        }

        button {
            background: linear-gradient(135deg, #DC143C, #8B0000);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220,20,60,0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .participant-card {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .participant-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);

        .participant-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .participant-name {
            font-size: 1.4em;
            font-weight: 700;
            color: #DC143C;
        }

        .participant-score {
            font-size: 1.8em;
            font-weight: 700;
            color: #1a73e8;
        }

        .participant-picks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .pick-item {
            background: white;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #DC143C;
        }

        .pick-label {
            font-size: 0.85em;
            color: #666;
            font-weight: 600;
        }

        .pick-value {
            font-size: 1em;
            color: #333;
            margin-top: 2px;
        }

        .golfer-score {

            margin-left: 8px;
            padding: 2px 8px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9em;

            color: #c62828;
        }

        .predicted-score {
            margin-top: 10px;
            padding: 10px;
            background: #fff3e0;
            border-radius: 6px;
            border-left: 4px solid #ff9800;
        }

        .leaderboard {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .admin-section {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .admin-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .score-entry {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1565c0;
        }

        .alert-warning {
            background: #fff3e0;
            color: #e65100;
            border-left: 4px solid #e65100;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .countdown {
            font-size: 1.1em;
            font-weight: 600;
            color: #d32f2f;
            margin: 10px 0;
        }

        .locked-message {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .locked-message h2 {
            color: #d32f2f;
            margin-bottom: 10px;
        }

        .chart-container {
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .chart-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #DC143C;
        }

        .bar-chart {
            display: flex;

            gap: 15px;

        .bar-item {
            display: flex;
            align-items: center;
            gap: 10px;

        .bar-label {

            font-weight: 500;
            font-size: 0.9em;

        .bar-visual {
            flex: 1;
            height: 30px;
            background: linear-gradient(90deg, #DC143C, #FF6347);
            border-radius: 4px;
            position: relative;
            min-width: 20px;
        }

        .bar-count {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-weight: 600;
            font-size: 0.9em;

            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(220, 20, 60, 0.9);
            color: white;

            border-radius: 20px;

                font-size: 14px;
                min-width: 80px;
            }

                padding: 20px;
            }

                grid-template-columns: 1fr;
            }

</head>

        async function saveData() {

                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`

                        const currentCount = currentParticipants.length;
                        const newCount = participants.length;

                        // Block ANY decrease in participant count

                            alert(`🚨 DATA SAFEGUARD TRIGGERED!\n\nCannot save: This would reduce participants from ${currentCount} to ${newCount}.\n\nReloading correct data from database...`);
                            console.error('Save blocked: participant count decrease detected');
                            
                            // Reload correct data

                            golferScores = currentData[0].value.golferScores || {};
                            missedCuts = currentData[0].value.missedCuts || [];
                            
                            renderAllPicks();
                            renderLeaderboard();
                            return;
                        }
                    }
                }

                // Safe to proceed with save
                const poolData = {
                    participants,
                    golferScores,
                    missedCuts
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/pool_data?key=eq.${DATABASE_KEY}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ value: poolData })
                });

                if (response.ok) {
                    console.log('✅ Data saved successfully');
                } else {
                    console.error('Failed to save data');
                }
            } catch (error) {
                console.error('Error saving data:', error);
            }
        }

            const countdownEl = document.getElementById('countdown-display');

                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                countdownEl.innerHTML = `
                    <div class="alert alert-warning">
                        <strong>⏰ Picks lock in:</strong>
                        <div class="countdown">${days}d ${hours}h ${minutes}m ${seconds}s</div>

            } else {
                countdownEl.innerHTML = `
                    <div class="alert alert-info">

            }

                group3: document.getElementById('group3').value,
                group4: document.getElementById('group4').value,
                group5: document.getElementById('group5').value,
                group6: document.getElementById('group6').value,
                wildcard1: document.getElementById('wildcard1').value,
                wildcard2: document.getElementById('wildcard2').value,
                wildcard3: document.getElementById('wildcard3').value
            };
            const predictedScore = parseInt(document.getElementById('predicted-score').value);

            // Validation
            if (!name) {
                alert('Please enter your name');
                return;
            }

            for (let key in picks) {
                if (!picks[key]) {
                    alert(`Please select a golfer for ${key.replace(/(\d)/, ' $1')}`);
                    return;
                }
            }

            // Check for duplicate golfers across wild cards
            const allPicks = Object.values(picks);
            const uniquePicks = new Set(allPicks);
            if (uniquePicks.size !== allPicks.length) {
                alert('You cannot select the same golfer multiple times!');
                return;
            }

            if (isNaN(predictedScore)) {
                alert('Please enter a valid predicted score');
                return;
            }

            // Check if name already exists
            const existingIndex = participants.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
            
            if (existingIndex >= 0) {
                if (!confirm(`Update picks for ${name}?`)) {
                    return;
                }
                participants[existingIndex] = { name, picks, predictedScore };
            } else {
                participants.push({ name, picks, predictedScore });
            }

            saveData();
            alert('Picks submitted successfully!');
            
            // Clear form
            document.getElementById('name').value = '';
            Object.keys(picks).forEach(key => {
                document.getElementById(key).value = '';
            });
            document.getElementById('predicted-score').value = '';

            renderAllPicks();
            renderLeaderboard();
        }

        // All picks display
        function renderAllPicks() {
            const container = document.getElementById('all-picks-display');
            const now = new Date();
            const visible = now >= TSTART || isAdmin;

            if (!visible) {
                container.innerHTML = `
                    <div class="locked-message">
                        <h2>🔒 Picks Hidden</h2>
                        <p>All picks will be visible when the tournament starts.</p>
                    </div>
                `;
                return;
            }

            if (participants.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No picks submitted yet.</div>';
                return;
            }

            const sorted = [...participants].sort((a, b) => a.name.localeCompare(b.name));

            container.innerHTML = sorted.map(p => {
                const scores = Object.keys(p.picks).map(key => {
                    const golfer = p.picks[key];
                    const score = golferScores[golfer];
                    const isMC = missedCuts.includes(golfer);
                    return { golfer, score, isMC, group: key };
                });

                return `
                    <div class="participant-card">
                        <div class="participant-header">
                            <div class="participant-name">${p.name}</div>
                            <div class="participant-score">${calculateScore(p)}</div>
                        </div>
                        <div class="participant-picks">
                            ${scores.map(s => `
                                <div class="pick-item">
                                    <div class="pick-label">${s.group.replace(/(\d)/, ' $1').toUpperCase()}</div>
                                    <div class="pick-value">
                                        ${s.golfer}
                                        ${s.score !== undefined ? `<span class="golfer-score ${s.isMC ? 'missed-cut' : ''}">${s.isMC ? 'MC' : (s.score > 0 ? '+' : '') + s.score}</span>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="predicted-score">
                            <strong>Predicted Winner:</strong> ${p.predictedScore > 0 ? '+' : ''}${p.predictedScore}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Leaderboard
        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-display');
            const now = new Date();
            const visible = now >= TSTART || isAdmin;

            if (!visible) {
                container.innerHTML = `
                    <div class="locked-message">
                        <h2>🔒 Leaderboard Hidden</h2>
                        <p>The leaderboard will be visible when the tournament starts.</p>
                    </div>
                `;
                return;
            }

            if (participants.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No participants yet.</div>';
                return;
            }

            const sorted = [...participants]
                .map(p => ({ ...p, score: calculateScore(p) }))
                .sort((a, b) => a.score - b.score);

            container.innerHTML = `
                <div class="leaderboard">
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Name</th>
                                <th>Score</th>
                                <th>Best 6</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sorted.map((p, i) => {
                                const best6 = getBest6Golfers(p);
                                return `
                                    <tr>
                                        <td><strong>${i + 1}</strong></td>
                                        <td>${p.name}</td>
                                        <td><strong>${p.score}</strong></td>
                                        <td>${best6.map(g => g.golfer).join(', ')}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Calculate score
        function calculateScore(participant) {
            const scores = Object.values(participant.picks).map(golfer => {
                if (missedCuts.includes(golfer)) {
                    return 60; // MC = +30 for rounds 3 & 4
                }
                return golferScores[golfer] !== undefined ? golferScores[golfer] : 999;
            });

            // Best 6 of 9
            scores.sort((a, b) => a - b);
            const best6 = scores.slice(0, 6);
            return best6.reduce((sum, s) => sum + s, 0);
        }

        function getBest6Golfers(participant) {
            const scores = Object.keys(participant.picks).map(key => {
                const golfer = participant.picks[key];
                const score = missedCuts.includes(golfer) ? 60 : (golferScores[golfer] !== undefined ? golferScores[golfer] : 999);
                return { golfer, score };
            });

            scores.sort((a, b) => a.score - b.score);
            return scores.slice(0, 6);
        }

        // Scores display
        function renderScores() {
            const container = document.getElementById('scores-display');

            const allGolfers = new Set();
            Object.values(golferGroups).flat().forEach(g => allGolfers.add(g));

            const golferList = Array.from(allGolfers).sort();

            container.innerHTML = `
                ${isAdmin ? `
                    <div class="admin-section">
                        <h3>🔐 Admin Controls</h3>
                        <button onclick="adminLogin()">Admin Login</button>
                        <button onclick="fetchLiveScores()">⚡ Fetch Live Scores Now</button>
                        <div class="admin-controls">
                            <button onclick="clearAllScores()">Clear All Scores</button>
                            <button onclick="downloadBackup()">💾 Download Backup</button>
                        </div>
                    </div>
                ` : `
                    <button onclick="adminLogin()" style="margin-bottom: 20px;">Admin Login</button>
                `}

                <div class="alert alert-info">
                    <strong>Live Scores:</strong> Scores update automatically every 5 minutes during tournament hours (8 AM - 8 PM ET, Thu-Sun).
                </div>

                <div class="leaderboard">
                    <table>
                        <thead>
                            <tr>
                                <th>Golfer</th>
                                <th>Score</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${golferList.map(golfer => {
                                const score = golferScores[golfer];
                                const isMC = missedCuts.includes(golfer);
                                return `
                                    <tr>
                                        <td>${golfer}</td>
                                        <td>${score !== undefined ? ((score > 0 ? '+' : '') + score) : '-'}</td>
                                        <td>${isMC ? '❌ MC' : (score !== undefined ? '✓' : '-')}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Fetch live scores from DataGolf via Vercel serverless function
        async function fetchLiveScores() {
            try {
                console.log('Fetching live scores...');
                const response = await fetch('/api/scores');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('DataGolf response:', data);

                if (!data.live_stats || !Array.isArray(data.live_stats)) {
                    console.error('Unexpected data format:', data);
                    alert('Error: Unexpected data format from API');
                    return;
                }

                // Update scores from live_stats array
                let updatedCount = 0;
                data.live_stats.forEach(player => {
                    const name = player.player_name;
                    const score = player.total_to_par;

                    // Find matching golfer (case-insensitive)
                    const allGolfers = Object.values(golferGroups).flat();
                    const match = allGolfers.find(g => g.toLowerCase() === name.toLowerCase());

                    if (match && score !== null && score !== undefined) {
                        golferScores[match] = score;
                        updatedCount++;
                    }
                });

                console.log(`Updated ${updatedCount} golfer scores`);
                await saveData();
                renderScores();
                renderAllPicks();
                renderLeaderboard();
                alert(`✅ Updated ${updatedCount} golfer scores from DataGolf`);

            } catch (error) {
                console.error('Error fetching scores:', error);
                alert('Failed to fetch scores. Check console for details.');
            }
        }

        function clearAllScores() {
            if (!isAdmin) return;
            if (confirm('Clear all golfer scores?')) {
                golferScores = {};
                missedCuts = [];
                saveData();
                renderScores();
                renderAllPicks();
                renderLeaderboard();
            }
        }

        function adminLogin() {
            const password = prompt('Enter admin password:');
            if (password && btoa(password) === ADMIN_PASSWORD) {
                isAdmin = true;
                sessionStorage.setItem('apiAdmin', 'true');
                alert('Admin access granted!');
                renderEntryForm();
                renderScores();
                renderPopularity();
            } else if (password) {
                alert('Incorrect password');
            }
        }

        // Pick popularity
        function renderPopularity() {
            const container = document.getElementById('popularity-display');
            const now = new Date();
            const visible = now >= TSTART || isAdmin;

            if (!visible) {
                container.innerHTML = `
                    <div class="locked-message">
                        <h2>🔒 Pick Popularity Hidden</h2>
                        <p>This will be visible when the tournament starts.</p>
                    </div>
                `;
                return;
            }

            if (participants.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No picks yet.</div>';
                return;
            }

            const groups = ['group1', 'group2', 'group3', 'group4', 'group5', 'group6', 'wildcard1', 'wildcard2', 'wildcard3'];
            
            container.innerHTML = `
                ${isAdmin ? `
                    <div class="admin-section">
                        <button onclick="downloadBackup()">💾 Download Backup</button>
                    </div>
                ` : ''}
                
                ${groups.map(group => {
                    const counts = {};
                    participants.forEach(p => {
                        const golfer = p.picks[group];
                        counts[golfer] = (counts[golfer] || 0) + 1;
                    });

                    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
                    const maxCount = sorted[0]?.[1] || 1;

                    return `
                        <div class="chart-container">
                            <div class="chart-title">${group.replace(/(\d)/, ' $1').toUpperCase()}</div>
                            <div class="bar-chart">
                                ${sorted.map(([golfer, count]) => `
                                    <div class="bar-item">
                                        <div class="bar-label">${golfer}</div>
                                        <div class="bar-visual" style="width: ${(count / maxCount) * 100}%;">
                                            <div class="bar-count">${count}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('')}
            `;
        }

        function downloadBackup() {
            const backup = {
                participants,
                golferScores,
                missedCuts,
                timestamp: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `valspar-pool-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Tab switching
        function switchTab(tabName) {
            // Hide all panels
            document.querySelectorAll('.tab-content').forEach(panel => {
                panel.classList.remove('active');
            });

            // Deactivate all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected panel
            document.getElementById(`${tabName}-panel`).classList.add('active');

            // Activate selected button
            event.target.classList.add('active');

            // Render content for the active tab
            if (tabName === 'all-picks') {
                renderAllPicks();
            } else if (tabName === 'leaderboard') {
                renderLeaderboard();
            } else if (tabName === 'scores') {
                renderScores();
            } else if (tabName === 'popularity') {
                renderPopularity();
            }
        }
    </script>
</body>
</html>
